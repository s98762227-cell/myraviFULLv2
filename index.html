<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐜 Муравьиный Симулятор 2D</title>
    <style>
        :root {
            --bg: #1a1a1a; --panel: #2a2218; --gold: #e8b84b; --green: #6db36d;
            --text: #e0d8c8; --accent: #d4894a; --btn: #3d2e1c; --btn-hover: #5a3f28;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; overflow: hidden; font-family: 'Segoe UI', 'Arial', sans-serif; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; height: 100vh; width: 100vw; cursor: default; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #main-menu { position: absolute; z-index: 20; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, #3d2e1c 0%, #2a1f10 100%); border: 3px solid #6b4c2a; border-radius: 24px; padding: 40px 36px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); min-width: 380px; transition: all 0.3s; }
        #main-menu.hidden { display: none; }
        #main-menu h1 { font-size: 2.4em; color: #f0c060; margin-bottom: 6px; text-shadow: 0 3px 8px rgba(0,0,0,0.5); letter-spacing: 2px; }
        #main-menu .subtitle { color: #c4a87c; font-size: 0.95em; margin-bottom: 28px; letter-spacing: 1px; }
        #main-menu .ant-icon { font-size: 4em; display: block; margin-bottom: 8px; animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .menu-btn { display: block; width: 100%; padding: 14px 20px; margin: 10px 0; font-size: 1.1em; font-weight: 600; letter-spacing: 1px; border: 2px solid #6b4c2a; border-radius: 14px; cursor: pointer; background: linear-gradient(180deg, #5a3f28 0%, #3d2e1c 100%); color: #f0d890; transition: all 0.2s; text-transform: uppercase; font-family: inherit; }
        .menu-btn:hover { background: linear-gradient(180deg, #6b4c30 0%, #4a3522 100%); border-color: #8b6a3a; color: #ffe8a0; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .menu-btn:active { transform: scale(0.96); transition: all 0.05s; }
        .menu-btn.small { font-size: 0.85em; padding: 10px 16px; margin: 6px 0; letter-spacing: 0.5px; }
        .panel { position: absolute; z-index: 20; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(180deg, #3d2e1c 0%, #2a1f10 100%); border: 3px solid #6b4c2a; border-radius: 20px; padding: 28px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); min-width: 340px; max-width: 440px; max-height: 80vh; overflow-y: auto; color: #e0d8c8; display: none; }
        .panel.visible { display: block; }
        .panel h2 { text-align: center; color: #f0c060; font-size: 1.6em; margin-bottom: 16px; letter-spacing: 1px; }
        .panel .close-btn { position: absolute; top: 10px; right: 16px; font-size: 1.5em; cursor: pointer; color: #c4a87c; background: none; border: none; transition: color 0.2s; font-family: inherit; }
        .panel .close-btn:hover { color: #ffe8a0; }
        .panel .currency { text-align: center; font-size: 1.2em; color: #f0c060; margin-bottom: 16px; letter-spacing: 1px; }
        .shop-item { background: #2a1f14; border: 1px solid #4a3522; border-radius: 12px; padding: 14px 16px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .shop-item .info { flex: 1; }
        .shop-item .name { font-weight: 700; color: #f0d890; font-size: 0.95em; }
        .shop-item .desc { font-size: 0.78em; color: #b0a080; margin-top: 2px; }
        .shop-item .buy-btn { padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85em; border: 1px solid #6b4c2a; background: #4a3522; color: #f0d890; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
        .shop-item .buy-btn:hover { background: #5a3f28; border-color: #8b6a3a; }
        .shop-item .buy-btn.owned { background: #2a4a2a; border-color: #3a6a3a; color: #90d890; cursor: default; }
        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .skin-card { background: #2a1f14; border: 2px solid #3a2a18; border-radius: 14px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .skin-card:hover { border-color: #6b4c2a; background: #352818; }
        .skin-card.equipped { border-color: #f0c040; box-shadow: 0 0 16px rgba(200,150,40,0.35); }
        .skin-card .skin-preview { width: 50px; height: 50px; margin: 0 auto 6px; border-radius: 50%; border: 2px solid #5a3f28; }
        .skin-card .skin-name { font-size: 0.8em; color: #e0d8c8; font-weight: 600; }
        .skin-card .skin-price { font-size: 0.7em; color: #c4a060; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #3a2a18; }
        .setting-row label { color: #e0d8c8; font-size: 0.95em; }
        .setting-row input[type="range"] { width: 100px; accent-color: #d4894a; }
        .toggle-switch { width: 48px; height: 26px; background: #3a2a18; border-radius: 13px; cursor: pointer; position: relative; transition: background 0.3s; border: 1px solid #5a3f28; }
        .toggle-switch.on { background: #5a8a3a; border-color: #7ab85a; }
        .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #e0d8c8; border-radius: 50%; transition: left 0.3s; }
        .toggle-switch.on::after { left: 25px; }
        .toggle-switch.disabled { opacity: 0.5; pointer-events: none; }
        #hud { position: absolute; z-index: 5; top: 12px; left: 16px; color: #f0e8d0; font-size: 0.9em; pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,0.7); line-height: 1.6; letter-spacing: 0.5px; }
        #hud .hud-item { background: rgba(0,0,0,0.45); padding: 6px 12px; border-radius: 8px; margin: 4px 0; display: inline-block; backdrop-filter: blur(4px); }
        #hud .hud-val { color: #f0c060; font-weight: 700; }
        #minimap-hint { position: absolute; z-index: 5; bottom: 16px; left: 50%; transform: translateX(-50%); color: #c4a87c; font-size: 0.8em; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.6); letter-spacing: 1px; opacity: 0.8; transition: opacity 1s; }
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-track { background: #2a1f14; border-radius: 3px; }
        .panel::-webkit-scrollbar-thumb { background: #5a3f28; border-radius: 3px; }
        #map-panel { width: 85vw; height: 85vh; max-width: 800px; max-height: 600px; overflow: hidden; }
        #mapCanvas { width: 100%; height: calc(100% - 40px); display: block; cursor: crosshair; }
        .level-item { background: #2a1f14; border: 1px solid #4a3522; border-radius: 12px; padding: 14px 16px; margin: 10px 0; display: flex; align-items: center; gap: 12px; }
        .level-item.completed { border-color: #80b080; background: #1f2f1f; }
        .level-item .level-num { font-size: 1.5em; font-weight: 700; color: #f0c060; width: 40px; text-align: center; }
        .level-item .level-info { flex: 1; }
        .level-item .level-name { font-weight: 700; color: #f0d890; }
        .level-item .level-desc { font-size: 0.75em; color: #b0a080; }
        .level-item .level-reward { font-size: 0.8em; color: #c4a060; }
        .level-item .level-status { font-size: 0.85em; font-weight: 600; }
        @media (max-width: 500px) {
            #main-menu { min-width: auto; width: 90vw; padding: 24px 18px; }
            #main-menu h1 { font-size: 1.6em; }
            .panel { min-width: auto; width: 92vw; max-width: 92vw; padding: 18px 14px; }
            .skin-grid { grid-template-columns: repeat(2, 1fr); }
            #map-panel { width: 95vw; height: 70vh; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <span class="hud-item">🍄 Ресурсы: <span class="hud-val" id="hud-resources">0</span></span><br>
        <span class="hud-item">🐜 Муравьи: <span class="hud-val" id="hud-ants">1</span></span><br>
        <span class="hud-item">⭐ Очки: <span class="hud-val" id="hud-score">0</span></span><br>
        <span class="hud-item">🥬 Капуста: <span class="hud-val" id="hud-cabbage">0</span></span>
    </div>
    <div id="minimap-hint">WASD / Стрелки — движение | E — меню | M — карта | Клик — цель</div>

    <div id="main-menu">
        <span class="ant-icon">🐜</span>
        <h1>МУРАВЕЙНИК</h1>
        <p class="subtitle">Симулятор колонии</p>
        <button class="menu-btn" id="btn-play">🎮 Играть</button>
        <button class="menu-btn" id="btn-shop">🛒 Магазин</button>
        <button class="menu-btn" id="btn-skins">🎨 Скины</button>
        <button class="menu-btn" id="btn-levels">🏆 Уровни (50)</button>
        <button class="menu-btn" id="btn-settings">⚙️ Настройки</button>
    </div>

    <div class="panel" id="shop-panel">
        <button class="close-btn" id="close-shop">✕</button>
        <h2>🛒 Магазин</h2>
        <p class="currency">💰 Ресурсы: <span id="shop-balance">0</span> | 🥬 Капуста: <span id="shop-cabbage">0</span></p>
        <div id="shop-items"></div>
        <div id="cabbage-shop-items" style="margin-top:16px;"></div>
        <button class="menu-btn small" id="shop-back">Назад</button>
    </div>

    <div class="panel" id="skins-panel">
        <button class="close-btn" id="close-skins">✕</button>
        <h2>🎨 Скины муравья (60+)</h2>
        <p class="currency">💰 Ресурсы: <span id="skins-balance">0</span></p>
        <div class="skin-grid" id="skin-grid"></div>
        <button class="menu-btn small" id="skins-back">Назад</button>
    </div>

    <div class="panel" id="settings-panel">
        <button class="close-btn" id="close-settings">✕</button>
        <h2>⚙️ Настройки</h2>
        <div class="setting-row"><label>Частицы</label><div class="toggle-switch on" id="toggle-particles"></div></div>
        <div class="setting-row"><label>Феромонные следы</label><div class="toggle-switch on" id="toggle-pheromones"></div></div>
        <div class="setting-row"><label>Чувствительность</label><input type="range" min="50" max="200" value="100" id="sensitivity-slider"></div>
        <div class="setting-row"><label>Авто-сбор (подбегать)</label><div class="toggle-switch on" id="toggle-autocollect"></div></div>
        <div class="setting-row"><label>🔊 Звук</label><div class="toggle-switch on" id="toggle-sound"></div></div>
        <div class="setting-row"><label>🎵 Музыка</label><div class="toggle-switch on" id="toggle-music"></div></div>
        <div class="setting-row"><label>Громкость музыки</label><input type="range" min="0" max="100" value="40" id="music-volume-slider"></div>
        <div class="setting-row"><label>Шаги (звук)</label><div class="toggle-switch on" id="toggle-footsteps"></div></div>
        <div class="setting-row"><label>🌙 Темнота</label><div class="toggle-switch" id="toggle-darkness"></div></div>
        <div class="setting-row"><label>🏃 Убеги от 32gleb176</label><div class="toggle-switch" id="toggle-gleb"></div></div>
        <div class="setting-row"><label>👹 666 муравей</label><span style="color:#888;">В разработке</span></div>
        <div class="setting-row"><label>🦔 Sonic EXE</label><div class="toggle-switch" id="toggle-sonic"></div></div>
        <button class="menu-btn small" id="settings-back">Назад</button>
    </div>

    <div class="panel" id="levels-panel">
        <button class="close-btn" id="close-levels">✕</button>
        <h2>🏆 Уровни (50)</h2>
        <div id="levels-list"></div>
        <button class="menu-btn small" id="levels-back">Назад</button>
    </div>

    <div class="panel" id="map-panel">
        <button class="close-btn" id="close-map">✕</button>
        <h2>🗺️ Карта</h2>
        <canvas id="mapCanvas"></canvas>
    </div>

    <script>
        (function() {
            // ─────────────── DOM ───────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const mainMenu = document.getElementById('main-menu');
            const shopPanel = document.getElementById('shop-panel');
            const skinsPanel = document.getElementById('skins-panel');
            const settingsPanel = document.getElementById('settings-panel');
            const levelsPanel = document.getElementById('levels-panel');
            const mapPanel = document.getElementById('map-panel');
            const mapCanvas = document.getElementById('mapCanvas');
            const mapCtx = mapCanvas.getContext('2d');
            const hudResources = document.getElementById('hud-resources');
            const hudAnts = document.getElementById('hud-ants');
            const hudScore = document.getElementById('hud-score');
            const hudCabbage = document.getElementById('hud-cabbage');
            const minimapHint = document.getElementById('minimap-hint');

            // ─────────────── AUDIO ───────────────
            class AudioManager {
                constructor() {
                    this.ctx = null; this.masterGain = null; this.musicGain = null; this.sfxGain = null;
                    this.musicOscillators = []; this.musicInterval = null; this.scaryTimer = null; this.sonicInterval = null;
                    this.isMuted = false; this.isMusicOn = true; this.isFootstepsOn = true;
                    this.musicVolume = 0.4; this.footstepTimer = 0;
                }
                init() {
                    if (this.ctx) return;
                    try {
                        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                        this.masterGain = this.ctx.createGain(); this.masterGain.connect(this.ctx.destination); this.masterGain.gain.value = 1;
                        this.musicGain = this.ctx.createGain(); this.musicGain.connect(this.masterGain); this.musicGain.gain.value = this.musicVolume;
                        this.sfxGain = this.ctx.createGain(); this.sfxGain.connect(this.masterGain); this.sfxGain.gain.value = 1;
                        this.resumeContextOnInteraction();
                    } catch (e) { console.warn('Web Audio API не поддерживается'); }
                }
                resumeContextOnInteraction() {
                    const resume = () => { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); };
                    document.addEventListener('click', resume, { once: true });
                    document.addEventListener('touchstart', resume, { once: true });
                    document.addEventListener('keydown', resume, { once: true });
                }
                setMute(m) { this.isMuted = m; if (this.masterGain) this.masterGain.gain.value = m ? 0 : 1; }
                setMusicOn(on) { this.isMusicOn = on; if (!on) { this.stopMusic(); this.stopSonic(); } else if (settings.sonicMode) this.setSonicMusic(true); else this.startMusic(); }
                setMusicVolume(v) { this.musicVolume = v; if (this.musicGain) this.musicGain.gain.value = v; }
                setFootsteps(on) { this.isFootstepsOn = on; }
                playPickup() { if (!this.ctx || this.isMuted) return; this._tone(600, 800, 0.08); }
                playDeposit() { if (!this.ctx || this.isMuted) return; this._tone(400, 600, 0.15); setTimeout(() => this._tone(600, 800, 0.1), 60); }
                playSpawn() { if (!this.ctx || this.isMuted) return; this._tone(800, 1200, 0.1); }
                playClick() { if (!this.ctx || this.isMuted) return; this._noise(0.03, 0.15); }
                playFootstep() { if (!this.ctx || this.isMuted || !this.isFootstepsOn) return; this._noise(0.04, 0.08); }
                _tone(s, e, d) { const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(s, this.ctx.currentTime); o.frequency.linearRampToValueAtTime(e, this.ctx.currentTime + d); g.gain.setValueAtTime(0.3, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + d); o.connect(g); g.connect(this.sfxGain); o.start(); o.stop(this.ctx.currentTime + d); }
                _noise(d, v) { const b = this.ctx.createBuffer(1, this.ctx.sampleRate * d, this.ctx.sampleRate); const data = b.getChannelData(0); for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2); const s = this.ctx.createBufferSource(); s.buffer = b; const g = this.ctx.createGain(); g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + d); s.connect(g); g.connect(this.sfxGain); s.start(); }
                startMusic() { this.stopMusic(); this.stopSonic(); if (!this.isMusicOn) return; const notes = [261.63, 329.63, 392.00, 523.25]; let i = 0; const next = () => { if (!this.isMusicOn || settings.sonicMode) return; const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'sine'; o.frequency.value = notes[i++ % notes.length]; g.gain.setValueAtTime(0, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.2); g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5); o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3); this.musicOscillators.push(o); }; next(); this.musicInterval = setInterval(next, 3000); }
                stopMusic() { if (this.musicInterval) { clearInterval(this.musicInterval); this.musicInterval = null; } this.musicOscillators.forEach(o => { try { o.stop(); } catch (e) {} }); this.musicOscillators = []; }
                setSonicMusic(on) {
                    this.stopMusic(); this.stopSonic();
                    if (!this.ctx || !this.isMusicOn || !on) return;
                    const loop = () => {
                        if (!settings.sonicMode || !this.isMusicOn) return;
                        const now = this.ctx.currentTime;
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.type = 'square';
                        const notes = [330, 392, 523, 659, 784, 659, 523, 392];
                        const idx = Math.floor((now * 8) % notes.length);
                        o.frequency.value = notes[idx];
                        g.gain.setValueAtTime(0.08, now);
                        g.gain.linearRampToValueAtTime(0.06, now + 0.1);
                        o.connect(g);
                        g.connect(this.musicGain);
                        o.start(now);
                        o.stop(now + 0.15);
                        this.musicOscillators.push(o);
                        this.sonicInterval = setTimeout(loop, 125);
                    };
                    loop();
                }
                stopSonic() { if (this.sonicInterval) { clearTimeout(this.sonicInterval); this.sonicInterval = null; } }
            }
            const audio = new AudioManager();

            // ─────────────── GAME STATE ───────────────
            const WORLD_W = 2200, WORLD_H = 1700;
            let gameState = 'menu';
            let totalResources = 0, scorePoints = 0, cabbageCount = 0;
            let playerAnt = null, aiAnts = [], resources = [], pheromoneTrails = [], particles = [], anthill = null;
            let camera = { x: 0, y: 0, targetX: 0, targetY: 0 };
            let keys = {}, mouseWorld = { x: 0, y: 0 }, mouseScreen = { x: 0, y: 0 }, clickTarget = null;
            let antSpawnCounter = 0, antSpawnThreshold = 5;
            let settings = {
                particles: true, pheromones: true, sensitivity: 100, autocollect: true,
                sound: true, music: true, musicVolume: 40, footsteps: true,
                darkness: false, scaryMode: false, sonicMode: false, glebMode: false
            };
            let upgrades = { speed: 0, capacity: 0, pheromoneStrength: 0 };
            let cabbageUpgrades = { sprint: 0, radar: 0, backpack: 0 };
            const upgradeDefs = {
                speed: { name: 'Скорость', desc: 'Ускорение движения', priceBase: 20, maxLevel: 4, perLevel: 0.3 },
                capacity: { name: 'Вместимость инвентаря', desc: 'Нести больше ресурсов за раз', priceBase: 40, maxLevel: 2, perLevel: 1 },
                pheromoneStrength: { name: 'Сила феромонов', desc: 'Следы держатся дольше', priceBase: 25, maxLevel: 3, perLevel: 5 },
            };
            const cabbageUpgradeDefs = {
                sprint: { name: 'Капустный спринт', desc: 'Скорость +15% за уровень', priceCabbage: 3, maxLevel: 3 },
                radar: { name: 'Капустный радар', desc: 'Радиус автосбора +10', priceCabbage: 2, maxLevel: 3 },
                backpack: { name: 'Капустный рюкзак', desc: '+1 к инвентарю', priceCabbage: 4, maxLevel: 2 },
            };

            // Генерация 50 скинов для уровней
            const levelSkinNames = [
                "Лесной","Песчаный","Ледяной","Магмовый","Неоновый","Металлик","Радужный-2","Космический","Зомби","Божественный",
                "Хромовый","Янтарный","Малахитовый","Рубиновый","Сапфировый","Топазовый","Аметистовый","Жемчужный","Коралловый","Бирюзовый",
                "Лазурный","Лавандовый","Мятный","Оливковый","Персиковый","Сливовый","Вишневый","Клубничный","Медовый","Шоколадный",
                "Кофейный","Карамельный","Ванильный","Лимонный","Лаймовый","Апельсиновый","Мандариновый","Гранатовый","Индиго","Фуксия",
                "Циан","Морской волны","Хаки","Болотный","Угольный","Серебряный","Платиновый","Бронзовый","Титановый","Обсидиановый"
            ];
            const levelSkinColors = [
                {c:"#2d5a27",a:"#1a3a14"},{c:"#c4a456",a:"#8a6e2a"},{c:"#8ab8d8",a:"#4a6e8a"},{c:"#b83010",a:"#601008"},{c:"#ff40b0",a:"#a01060"},
                {c:"#a0a0b0",a:"#606070"},{c:"#40ff80",a:"#20a040"},{c:"#181848",a:"#302070"},{c:"#5a5a30",a:"#3a3a10"},{c:"#ffe8a0",a:"#c4a020"},
                {c:"#c0c0c0",a:"#808080"},{c:"#e8b84b",a:"#8a5a10"},{c:"#2a7a4a",a:"#104020"},{c:"#e84020",a:"#a01010"},{c:"#2a4a8b",a:"#102050"},
                {c:"#ffcc00",a:"#aa8800"},{c:"#9966cc",a:"#552288"},{c:"#f0f0f0",a:"#aaaaaa"},{c:"#ff7f50",a:"#aa3a20"},{c:"#40e0d0",a:"#208080"},

            function updateMapCanvas() {
                if (!anthill) return;
                mapCanvas.width = mapCanvas.clientWidth; mapCanvas.height = mapCanvas.clientHeight;
                const mctx = mapCtx; mctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
                mctx.fillStyle = '#5a8a3a'; mctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
                mctx.fillStyle = '#6b4a2a'; mctx.beginPath(); mctx.arc(anthill.x * (mapCanvas.width / WORLD_W), anthill.y * (mapCanvas.height / WORLD_H), 5, 0, Math.PI*2); mctx.fill();
                mctx.fillStyle = '#ffe090'; for (const res of resources) if (!res.carriedBy) mctx.fillRect(res.x * (mapCanvas.width / WORLD_W) - 1, res.y * (mapCanvas.height / WORLD_H) - 1, 2, 2);
                mctx.fillStyle = '#e0c080'; for (const ant of aiAnts) mctx.fillRect(ant.x * (mapCanvas.width / WORLD_W) - 1, ant.y * (mapCanvas.height / WORLD_H) - 1, 2, 2);
                if (playerAnt) { mctx.fillStyle = '#fff'; mctx.beginPath(); mctx.arc(playerAnt.x * (mapCanvas.width / WORLD_W), playerAnt.y * (mapCanvas.height / WORLD_H), 3, 0, Math.PI*2); mctx.fill(); mctx.strokeStyle = '#000'; mctx.lineWidth = 1; mctx.stroke(); }
                const vx = camera.x / WORLD_W * mapCanvas.width, vy = camera.y / WORLD_H * mapCanvas.height;
                const vw = canvas.width / WORLD_W * mapCanvas.width, vh = canvas.height / WORLD_H * mapCanvas.height;
                mctx.strokeStyle = '#fff'; mctx.lineWidth = 2; mctx.strokeRect(vx, vy, vw, vh);
            }

            // ─────────────── GAME CLASSES ───────────────
            class Anthill {
                constructor(x, y) { this.x = x; this.y = y; this.radius = 40; this.pulse = 0; }
                update(dt) { this.pulse += dt * 1.5; }
                draw(ctx, cam) {
                    const sx = this.x - cam.x, sy = this.y - cam.y, pulseR = this.radius + Math.sin(this.pulse) * 4;
                    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(sx, sy + 8, pulseR + 6, pulseR * 0.8 + 4, 0, 0, Math.PI*2); ctx.fill();
                    const grad = ctx.createRadialGradient(sx-5, sy-8, pulseR*0.1, sx, sy, pulseR);
                    grad.addColorStop(0,'#8b6b4a'); grad.addColorStop(0.5,'#6b4a2a'); grad.addColorStop(1,'#3d2a14');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx, sy, pulseR, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 2; ctx.stroke();
                    const holeGrad = ctx.createRadialGradient(sx, sy+3, 2, sx, sy, pulseR*0.35);
                    holeGrad.addColorStop(0,'#0a0500'); holeGrad.addColorStop(1,'#3d2a14');
                    ctx.fillStyle = holeGrad; ctx.beginPath(); ctx.ellipse(sx, sy+2, pulseR*0.32, pulseR*0.22, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    for(let i=0;i<12;i++){ const a=(i/12)*Math.PI*2+this.pulse*0.3; const d=pulseR*(0.5+Math.sin(i*3.7)*0.35); ctx.beginPath(); ctx.arc(sx+Math.cos(a)*d, sy+Math.sin(a)*d*0.7,2.5,0,Math.PI*2); ctx.fill(); }
                }
                containsPoint(wx,wy){ const dx=wx-this.x, dy=wy-this.y; return Math.sqrt(dx*dx+dy*dy)<this.radius+8; }
            }

            class Ant {
                constructor(x,y,isPlayer=false,skin=null){
                    this.x=x; this.y=y; this.vx=0; this.vy=0; this.angle=Math.random()*Math.PI*2;
                    this.isPlayer=isPlayer; this.skin=skin||currentSkin;
                    this.carryingResources = []; this.carryingCapacity = 1 + upgrades.capacity + cabbageUpgrades.backpack;
                    this.speed=isPlayer?180:70+Math.random()*40; this.wobble=Math.random()*Math.PI*2;
                    this.wobbleSpeed=2+Math.random()*4; this.wobbleAmp=isPlayer?0.3:1.2;

                }
                updateAI(dt){
                    if(this.restTimer>0){ this.restTimer-=dt; this.vx*=0.9; this.vy*=0.9; this.x+=this.vx*dt; this.y+=this.vy*dt; return; }

                }
                followPheromones(dt,seeking){
                    if(!settings.pheromones) return; let bestStr=0,bestX=0,bestY=0;
                    for(const trail of pheromoneTrails){ const td=Math.hypot(this.x-trail.x,this.y-trail.y); if(td<60&&trail.strength>bestStr){ bestStr=trail.strength; bestX=trail.x; bestY=trail.y; } }

            function checkLevelCompletion() {

            function saveGame() {
                try {
                    const saveData = {
                        completedLevels, totalResources, scorePoints, cabbageCount, upgrades, cabbageUpgrades,
                        sonicSkinUnlocked, glebSkinUnlocked, currentSkinId: currentSkin.id,
                        skinOwnership: skinDefs.map(s => s.owned)
                    };
                    localStorage.setItem('antSimSave', JSON.stringify(saveData));
                } catch(e) {}
            }
            function loadProgress() {
                try {
                    const saved = localStorage.getItem('antSimSave');
                    if (saved) {
                        const data = JSON.parse(saved);
                        completedLevels = data.completedLevels || new Array(50).fill(false);
                        if (completedLevels.length < 50) {
                            const old = completedLevels;
                            completedLevels = new Array(50).fill(false);
                            for (let i = 0; i < old.length; i++) completedLevels[i] = old[i];
                        }
                        totalResources = data.totalResources || 0;
                        scorePoints = data.scorePoints || 0;
                        cabbageCount = data.cabbageCount || 0;
                        upgrades = data.upgrades || { speed:0, capacity:0, pheromoneStrength:0 };
                        cabbageUpgrades = data.cabbageUpgrades || { sprint:0, radar:0, backpack:0 };
                        sonicSkinUnlocked = data.sonicSkinUnlocked || false;
                        glebSkinUnlocked = data.glebSkinUnlocked || false;
                        if (data.skinOwnership) {
                            for (let i = 0; i < Math.min(skinDefs.length, data.skinOwnership.length); i++) {
                                skinDefs[i].owned = data.skinOwnership[i];
                            }
                        }
                        const skin = skinDefs.find(s => s.id === data.currentSkinId);
                        if (skin) { skinDefs.forEach(s => s.equipped = false); skin.equipped = true; currentSkin = skin; }
                    } else {
                        try { const savedLevels = localStorage.getItem('antLevels'); if (savedLevels) { const arr = JSON.parse(savedLevels); completedLevels = new Array(50).fill(false); for (let i = 0; i < Math.min(arr.length, 50); i++) completedLevels[i] = arr[i]; } } catch(e) {}
                    }
                } catch(e) {
                    try { const savedLevels = localStorage.getItem('antLevels'); if (savedLevels) { const arr = JSON.parse(savedLevels); completedLevels = new Array(50).fill(false); for (let i = 0; i < Math.min(arr.length, 50); i++) completedLevels[i] = arr[i]; } } catch(e2) {}
                }
                for (const skin of skinDefs) { if (skin.unlockLevel && completedLevels[skin.unlockLevel-1]) skin.owned = true; }
                if (sonicSkinUnlocked) { const skin = skinDefs.find(s => s.id === 'tr_spice'); if (skin) skin.owned = true; }
                if (glebSkinUnlocked) { const skin = skinDefs.find(s => s.id === 'gleb176'); if (skin) skin.owned = true; }
            }

            const terrainCache={};
            function drawTerrain(ctx,cam){
                const startTX=Math.floor(cam.x/120)*120, startTY=Math.floor(cam.y/120)*120;
                const endTX=Math.ceil((cam.x+canvas.width)/120)*120, endTY=Math.ceil((cam.y+canvas.height)/120)*120;
                for(let tx=startTX;tx<=endTX;tx+=120){ for(let ty=startTY;ty<=endTY;ty+=120){
                    const key=`${tx},${ty}`; if(!terrainCache[key]){ const shade=0.75+Math.sin(tx*0.013+ty*0.009)*0.15+Math.cos(tx*0.007-ty*0.011)*0.1; terrainCache[key]=`rgb(${85*shade},${145*shade},${55*shade})`; }
                    const sx=tx-cam.x, sy=ty-cam.y; ctx.fillStyle=terrainCache[key]; ctx.fillRect(sx,sy,122,122);
                    const pseudoRandom=((tx*37+ty*73)*16807%2147483647)/2147483647; if(pseudoRandom<0.18){ ctx.fillStyle='rgba(139,107,74,0.3)'; ctx.beginPath(); ctx.arc(sx+60+Math.sin(tx*37)*30,sy+60+Math.cos(ty*73)*30,25+pseudoRandom*30,0,Math.PI*2); ctx.fill(); }
                } }
                ctx.strokeStyle='rgba(80,140,40,0.4)'; ctx.lineWidth=1;
                for(let i=0;i<60;i++){ const gx=(i*373+127)%WORLD_W, gy=(i*619+311)%WORLD_H; const sx=gx-cam.x,sy=gy-cam.y; if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20) continue; for(let t=0;t<3;t++){ const ta=i*0.7+t*2.1; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+Math.cos(ta)*8,sy-6-t*3); ctx.stroke(); } }
            }

            let lastTime=performance.now(), resourceRespawnTimer=0;
            function gameLoop(time){
                requestAnimationFrame(gameLoop);
                let dt = (time - lastTime)/1000; if (dt > 0.1) dt = 0.1; if (dt <= 0) dt = 0.016; lastTime = time;
                if (gameState === 'playing') update(dt);
                if (gameState === 'map' && mapPanel.classList.contains('visible')) updateMapCanvas();
                render();
            }

            function update(dt) {
                if (!anthill) return;
                anthill.update(dt);
                if (playerAnt) {
                    playerAnt.update(dt);
                    camera.targetX = playerAnt.x - canvas.width/2;
                    camera.targetY = playerAnt.y - canvas.height/2;
                }
                for (const ant of aiAnts) ant.update(dt);
                for (const res of resources) res.update(dt);
                for (let i=pheromoneTrails.length-1; i>=0; i--) {
                    const t = pheromoneTrails[i]; t.life -= dt; t.strength = t.life / t.maxLife;
                    if (t.life <= 0) pheromoneTrails.splice(i,1);
                }
                while (pheromoneTrails.length > 600) pheromoneTrails.shift();
                updateParticles(dt);
                camera.x += (camera.targetX - camera.x) * 6 * dt;
                camera.y += (camera.targetY - camera.y) * 6 * dt;
                camera.x = Math.max(-50, Math.min(WORLD_W - canvas.width + 50, camera.x));
                camera.y = Math.max(-50, Math.min(WORLD_H - canvas.height + 50, camera.y));
                resourceRespawnTimer += dt;
                if (resourceRespawnTimer > 4 && resources.length < 40) {
                    resourceRespawnTimer = 0;
                    const types = ['mushroom','mushroom','mushroom','leaf','leaf','crystal','berry','cabbage'];
                    resources.push(new Resource(60+Math.random()*(WORLD_W-120), 60+Math.random()*(WORLD_H-120), types[Math.floor(Math.random()*types.length)]));
                }
                if (minimapHint.style.opacity > 0.1) minimapHint.style.opacity = Math.max(0, parseFloat(minimapHint.style.opacity) - dt*0.08);

                // Gleb176 mode
                if (settings.glebMode && gameState === 'playing' && playerAnt) {
                    if (glebAnt) {
                        glebAnt.update(dt);
                        if (Math.hypot(playerAnt.x - glebAnt.x, playerAnt.y - glebAnt.y) < 30) {
                            totalResources = 0; cabbageCount = 0; updateHUD();
                            playerAnt.x = anthill.x + 50; playerAnt.y = anthill.y + 30;
                            playerAnt.carryingResources = [];
                            glebAnt = new GlebAnt(playerAnt.x + 200, playerAnt.y - 100, playerAnt);
                            glebSurvivalTimer = 0;
                            spawnParticles(playerAnt.x, playerAnt.y, '#ff0000', 25);
                        } else {
                            glebSurvivalTimer += dt;
                            if (glebSurvivalTimer >= GLEB_SURVIVAL_TIME) {
                                cabbageCount += 10;
                                if (!glebSkinUnlocked) {
                                    glebSkinUnlocked = true;
                                    const skin = skinDefs.find(s => s.id === 'gleb176');
                                    if (skin) skin.owned = true;
                                }
                                saveGame();
                                settings.glebMode = false;
                                document.getElementById('toggle-gleb').classList.remove('on');
                                glebAnt = null; glebSurvivalTimer = 0;
                                updateAllBalances(); updateHUD();
                                spawnParticles(playerAnt.x, playerAnt.y, '#ffd700', 40);
                            }
                        }
                    } else {
                        glebAnt = new GlebAnt(playerAnt.x + 200, playerAnt.y - 100, playerAnt);
                        glebSurvivalTimer = 0;
                    }
                }

                // Sonic EXE mode
                if (settings.sonicMode && gameState === 'playing' && playerAnt) {
                    if (sonicAnt) {
                        sonicAnt.update(dt);
                        if (Math.hypot(playerAnt.x - sonicAnt.x, playerAnt.y - sonicAnt.y) < 25) {
                            totalResources = 0; cabbageCount = 0; updateHUD();
                            playerAnt.x = anthill.x + 50; playerAnt.y = anthill.y + 30;
                            playerAnt.carryingResources = [];
                            sonicAnt = new SonicAnt(playerAnt.x + 200, playerAnt.y - 100, playerAnt);
                            sonicSurvivalTimer = 0;
                            spawnParticles(playerAnt.x, playerAnt.y, '#ff0000', 20);
                        } else {
                            sonicSurvivalTimer += dt;
                            if (sonicSurvivalTimer >= SONIC_SURVIVAL_TIME && !sonicSkinUnlocked) {
                                sonicSkinUnlocked = true;
                                const skin = skinDefs.find(s => s.id === 'tr_spice');
                                if (skin) skin.owned = true;
                                saveGame();
                                settings.sonicMode = false;
                                document.getElementById('toggle-sonic').classList.remove('on');
                                sonicAnt = null;
                                audio.setSonicMusic(false);
                                updateAllBalances();
                            }
                        }
                    } else {
                        sonicAnt = new SonicAnt(playerAnt.x + 200, playerAnt.y - 100, playerAnt);
                        sonicSurvivalTimer = 0;
                    }
                }
            }

            function render() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if ((gameState === 'playing' || gameState === 'map') && anthill) {
                    drawTerrain(ctx, camera);
                    anthill.draw(ctx, camera);
                    for (const res of resources) res.draw(ctx, camera);
                    for (const ant of aiAnts) ant.draw(ctx, camera);
                    if (playerAnt) playerAnt.draw(ctx, camera);
                    if (sonicAnt && settings.sonicMode) sonicAnt.draw(ctx, camera);
                    if (glebAnt && settings.glebMode) glebAnt.draw(ctx, camera);
                    drawParticles(ctx, camera);
                    if (clickTarget) {
                        const sx = clickTarget.x - camera.x, sy = clickTarget.y - camera.y;
                        ctx.strokeStyle = 'rgba(255,220,150,0.6)'; ctx.lineWidth = 2;
                        ctx.setLineDash([6,4]); ctx.beginPath(); ctx.arc(sx, sy, 10+Math.sin(Date.now()/400)*4, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
                        ctx.fillStyle = 'rgba(255,220,150,0.5)'; ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();
                    }
                    if (settings.darkness && playerAnt) {
                        const sx = playerAnt.x - camera.x, sy = playerAnt.y - camera.y;
                        ctx.save();
                        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
                        ctx.globalCompositeOperation = 'destination-out';
                        const gradient = ctx.createRadialGradient(sx, sy, 100, sx, sy, 150);
                        gradient.addColorStop(0, 'rgba(0,0,0,1)'); gradient.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(sx, sy, 150, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    }
                    if (settings.pheromones) {
                        for (const trail of pheromoneTrails) {
                            const sx = trail.x - camera.x, sy = trail.y - camera.y;
                            ctx.fillStyle = trail.fromPlayer ? `rgba(200,180,140,${trail.strength*0.5})` : `rgba(255,200,100,${trail.strength*0.7})`;
                            ctx.beginPath(); ctx.arc(sx, sy, trail.fromPlayer?2.5:3.5, 0, Math.PI*2); ctx.fill();
                        }
                    }
                    if (settings.glebMode && playerAnt && glebSurvivalTimer < GLEB_SURVIVAL_TIME) {
                        const remaining = Math.max(0, GLEB_SURVIVAL_TIME - glebSurvivalTimer);
                        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(canvas.width/2 - 55, 10, 110, 30);
                        ctx.strokeStyle = '#ff5080'; ctx.lineWidth = 2; ctx.strokeRect(canvas.width/2 - 55, 10, 110, 30);
                        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Segoe UI, Arial'; ctx.textAlign = 'center';
                        ctx.fillText(`⏱ ${remaining.toFixed(1)}s`, canvas.width/2, 33);
                        ctx.textAlign = 'start';
                    }
                    const mmW=140, mmH=100, mmX=canvas.width-mmW-16, mmY=canvas.height-mmH-16;
                    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.strokeStyle='rgba(200,160,100,0.6)'; ctx.lineWidth=2;
                    ctx.beginPath(); ctx.roundRect(mmX,mmY,mmW,mmH,8); ctx.fill(); ctx.stroke();
                    ctx.save(); ctx.beginPath(); ctx.roundRect(mmX,mmY,mmW,mmH,8); ctx.clip();
                    ctx.fillStyle='#5a8a3a'; ctx.fillRect(mmX,mmY,mmW,mmH);
                    ctx.fillStyle='#6b4a2a'; ctx.beginPath(); ctx.arc(mmX+anthill.x*(mmW/WORLD_W), mmY+anthill.y*(mmH/WORLD_H), 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle='#ffe090'; for (const res of resources) if (!res.carriedBy) ctx.fillRect(mmX+res.x*(mmW/WORLD_W)-0.8, mmY+res.y*(mmH/WORLD_H)-0.8, 1.6, 1.6);
                    ctx.fillStyle='#e0c080'; for (const ant of aiAnts) ctx.fillRect(mmX+ant.x*(mmW/WORLD_W)-1, mmY+ant.y*(mmH/WORLD_H)-1, 2, 2);
                    if (playerAnt) { ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(mmX+playerAnt.x*(mmW/WORLD_W), mmY+playerAnt.y*(mmH/WORLD_H), 2.5, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=0.8; ctx.stroke(); }
                    if (glebAnt && settings.glebMode) { ctx.fillStyle='#ff3060'; ctx.beginPath(); ctx.arc(mmX+glebAnt.x*(mmW/WORLD_W), mmY+glebAnt.y*(mmH/WORLD_H), 3, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore();
                    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='9px Segoe UI, Arial'; ctx.fillText('МИНИ-КАРТА', mmX+6, mmY+14);
                } else if (gameState === 'menu') {
                    const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, canvas.width);
                    bgGrad.addColorStop(0,'#3d5a2a'); bgGrad.addColorStop(1,'#1a2a10');
                    ctx.fillStyle = bgGrad; ctx.fillRect(0,0,canvas.width,canvas.height);
                    const t = Date.now()/1000;
                    for (let i=0; i<8; i++) {
                        const ax = canvas.width*(0.15 + (i*0.7)/8 + Math.sin(t*0.7+i)*0.1);
                        const ay = canvas.height*(0.3 + Math.cos(t*0.5+i*1.3)*0.3);
                        ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(ax, ay+2, 6, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#3a2010'; ctx.beginPath(); ctx.arc(ax, ay, 5, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle='#1a0a00'; ctx.beginPath(); ctx.arc(ax+4, ay, 3.5, 0, Math.PI*2); ctx.fill();
                    }
                }
            }

            if (!ctx.roundRect) {
                ctx.roundRect = function(x,y,w,h,r) {
                    if (typeof r === 'number') r = {tl:r, tr:r, br:r, bl:r};
                    ctx.beginPath();
                    ctx.moveTo(x+r.tl, y);
                    ctx.lineTo(x+w-r.tr, y);
                    ctx.quadraticCurveTo(x+w, y, x+w, y+r.tr);
                    ctx.lineTo(x+w, y+h-r.br);
                    ctx.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
                    ctx.lineTo(x+r.bl, y+h);
                    ctx.quadraticCurveTo(x, y+h, x, y+h-r.bl);
                    ctx.lineTo(x, y+r.tl);
                    ctx.quadraticCurveTo(x, y, x+r.tl, y);
                    ctx.closePath();
                };
            }

            function init() {
                resize(); loadProgress(); updateAllBalances(); updateSettingsUI();
                mainMenu.classList.remove('hidden'); closeAllPanels(); gameState='menu'; updateHUD();
                audio.init();
            }
            init();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
